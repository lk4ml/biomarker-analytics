databases:
  - name: biomarker-db
    plan: free
    databaseName: biomarker_analytics
    user: biomarker_user

services:
  - type: web
    name: biomarker-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: biomarker-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ONCOKB_API_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
